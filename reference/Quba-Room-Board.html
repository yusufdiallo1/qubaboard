<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBFAF7">
<title>قُبا · لوحة الغرف · Quba Room Board</title>
<style>
  :root{
    --navy:#1B2A47; --gold:#C6A253; --gold-deep:#A4924E; --cream:#F6F1E7;
    --bg:#FBFAF7; --surface:#FFFFFF; --surface-2:#F3F0E9;
    --line:rgba(20,22,34,.10); --line-soft:rgba(20,22,34,.06);
    --text:#1b1d22; --dim:#5f6672; --faint:#9aa0aa; --info:#2B5FA5;
    --shadow:0 1px 2px rgba(20,22,34,.04), 0 6px 20px -12px rgba(20,22,34,.18);
    --shadow-lift:0 10px 40px -16px rgba(20,22,34,.30);
    --free:#2FA36B; --booked:#C6A253; --checkout:#E0823C; --cleaning:#7C6BB0; --maint:#CC4B4B;
    --radius:18px; --radius-sm:12px;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI","IBM Plex Sans Arabic","Helvetica Neue",system-ui,"Noto Sans Arabic",sans-serif;
  }
  [data-theme="dark"]{
    --bg:#0c1118; --surface:#141b26; --surface-2:#1b2330;
    --line:rgba(255,255,255,.11); --line-soft:rgba(255,255,255,.06);
    --text:#ECEAE2; --dim:#9aa3b2; --faint:#6b7480; --info:#4f86d4;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 26px -14px rgba(0,0,0,.7);
    --shadow-lift:0 18px 50px -18px rgba(0,0,0,.8);
    --free:#37b87b; --booked:#d3b264; --checkout:#ec9550; --cleaning:#9684c9; --maint:#dd6363;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    font-variant-numeric:tabular-nums;font-feature-settings:"tnum";min-height:100dvh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}
  ::selection{background:rgba(198,162,83,.28)}

  .login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
  .login::before{content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(900px 500px at 50% -10%, color-mix(in srgb,var(--gold) 12%, transparent), transparent 60%)}
  .login-top{position:fixed;top:calc(env(safe-area-inset-top) + 14px);inset-inline-end:16px;display:flex;gap:8px;z-index:3}
  .login-card{position:relative;z-index:2;width:100%;max-width:384px;background:var(--surface);border:1px solid var(--line);
    border-radius:26px;padding:36px 30px 30px;box-shadow:var(--shadow-lift);text-align:center;animation:rise .5s cubic-bezier(.2,.8,.25,1) both}
  .login-logo{width:62px;height:62px;object-fit:contain;margin:0 auto 16px;filter:drop-shadow(0 6px 18px rgba(198,162,83,.2))}
  .login-card h1{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  [dir="rtl"] .login-card h1{letter-spacing:0}
  .login-card .sub{font-size:13px;color:var(--faint);font-weight:600;margin-bottom:26px;letter-spacing:.04em}
  .login-card .field{text-align:start;margin-bottom:13px}
  .login-card .err{color:var(--maint);font-size:13px;font-weight:600;margin-top:13px;min-height:18px}
  .login-foot{margin-top:22px;font-size:11px;color:var(--faint);letter-spacing:.16em;font-weight:700}
  .login-foot .st{color:var(--gold)}

  .topbar{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 12px) clamp(14px,3vw,28px) 12px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand img{width:34px;height:34px;object-fit:contain;flex:none}
  .brand .nm{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  .brand .nm b{font-size:18px;font-weight:700;letter-spacing:-.01em}
  .brand .nm span{font-size:11.5px;color:var(--faint);font-weight:600;letter-spacing:.04em}
  .tb-spacer{flex:1}
  .datepill{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--dim);font-weight:600;
    background:var(--surface-2);padding:7px 12px;border-radius:980px;white-space:nowrap}
  .datepill svg{width:15px;height:15px;color:var(--gold-deep)}
  .iconbtn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;
    background:var(--surface-2);color:var(--text);transition:transform .14s,background .2s;flex:none}
  .iconbtn:active{transform:scale(.9)}
  .iconbtn svg{width:18px;height:18px}
  .iconbtn.lang{font-weight:800;font-size:13px}
  .pwrap{position:relative;flex:none}
  .pchip{display:inline-flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:980px;padding:5px;padding-inline-end:12px;transition:transform .14s}
  .pchip:active{transform:scale(.96)}
  .pchip .av{width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;flex:none}
  [data-theme="dark"] .pchip .av{background:var(--gold);color:#1b1407}
  .pchip .pinfo{display:flex;flex-direction:column;line-height:1.15;text-align:start}
  .pchip .pn{font-size:13px;font-weight:700}
  .pchip .pr{font-size:10.5px;color:var(--faint);font-weight:600}

  .layout{display:flex;max-width:1320px;margin:0 auto;align-items:flex-start}
  .sidenav{width:228px;flex:none;padding:20px 14px;border-inline-end:1px solid var(--line);display:flex;flex-direction:column;gap:5px;position:sticky;top:64px;align-self:flex-start;max-height:calc(100dvh - 64px);overflow-y:auto}
  .navitem{display:flex;align-items:center;gap:12px;width:100%;padding:12px 13px;border-radius:12px;
    font-size:14.5px;font-weight:650;color:var(--dim);transition:all .15s;text-align:start;position:relative}
  .navitem svg{width:19px;height:19px}
  .navitem:hover{background:var(--surface-2)}
  .navitem.on{background:var(--surface-2);color:var(--text)}
  .navitem.on::before{content:"";position:absolute;inset-inline-start:0;top:9px;bottom:9px;width:3px;border-radius:99px;background:var(--gold)}
  .content{flex:1;min-width:0;padding:18px clamp(14px,3vw,28px) 80px}
  @media(max-width:899px){
    .layout{flex-direction:column}
    .sidenav{width:auto;min-height:0;flex-direction:row;gap:8px;overflow-x:auto;padding:12px clamp(14px,3vw,28px);
      border-inline-end:none;border-bottom:1px solid var(--line);scrollbar-width:none}
    .sidenav::-webkit-scrollbar{display:none}
    .navitem{width:auto;white-space:nowrap;flex:none;padding:10px 15px;border-radius:980px;background:var(--surface);border:1px solid var(--line)}
    .navitem.on::before{display:none}
    .navitem.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  }

  .topline{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .occ{display:flex;flex-direction:column;gap:7px;min-width:200px;flex:1}
  .occ-h{display:flex;align-items:baseline;gap:8px}
  .occ-h b{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .occ-h .of{font-size:13px;color:var(--dim);font-weight:600}
  .occ-h .lab{font-size:12.5px;color:var(--faint);font-weight:600;margin-inline-start:auto}
  .bar{height:8px;border-radius:999px;background:var(--surface-2);overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--booked),var(--gold-deep));transition:width .5s cubic-bezier(.2,.8,.25,1)}
  .ctrlrow{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:16px}
  .search{position:relative;flex:1;min-width:200px}
  .search svg{position:absolute;inset-inline-start:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint)}
  .search input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:980px;
    padding:12px 16px;padding-inline-start:40px;font-size:14.5px;color:var(--text);transition:border-color .2s,box-shadow .2s}
  .search input::placeholder{color:var(--faint)}
  .search input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(198,162,83,.13)}
  .vtoggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:980px;padding:3px;gap:2px;flex:none}
  .vt{width:40px;height:34px;border-radius:980px;display:grid;place-items:center;color:var(--dim);transition:all .15s}
  .vt svg{width:17px;height:17px}
  .vt.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

  .fdrop{position:relative;flex:none}
  .fbtn{display:inline-flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
    border-radius:980px;padding:11px 15px;font-size:14px;font-weight:650;color:var(--text);box-shadow:var(--shadow);transition:border-color .2s}
  .fbtn:active{transform:scale(.97)}
  .fbtn .fi{display:grid;place-items:center;color:var(--gold-deep)}
  .fbtn .fi svg{width:16px;height:16px}
  .fbtn .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .fbtn .ct{color:var(--dim);font-weight:700}
  .fbtn .chev{color:var(--faint);transition:transform .2s}
  .fbtn .chev svg{width:15px;height:15px;display:block}
  .fbtn.open .chev{transform:rotate(180deg)}
  .menu{position:absolute;z-index:80;margin-top:9px;min-width:236px;
    background:color-mix(in srgb, var(--surface) 80%, transparent);
    backdrop-filter:blur(24px) saturate(170%);-webkit-backdrop-filter:blur(24px) saturate(170%);
    border:1px solid var(--line);border-radius:16px;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,var(--shadow-lift);
    padding:7px;animation:pop .16s ease both}
  [data-theme="dark"] .menu{box-shadow:0 1px 0 rgba(255,255,255,.08) inset,var(--shadow-lift)}
  .fmenu{inset-inline-start:0}
  .mitem{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;border-radius:11px;
    font-size:14px;font-weight:600;color:var(--text);text-align:start;transition:background .14s}
  .mitem:hover{background:color-mix(in srgb,var(--text) 7%, transparent)}
  .mitem.on{background:color-mix(in srgb,var(--gold) 16%, transparent);color:var(--gold-deep)}
  .mitem .dot{width:10px;height:10px;border-radius:50%;background:var(--c,var(--faint));flex:none}
  .mitem .mi{display:grid;place-items:center;color:var(--dim)}
  .mitem .mi svg{width:15px;height:15px}
  .mitem .ct{margin-inline-start:auto;color:var(--dim);font-weight:700;font-size:13px}
  .mitem.on .ct{color:var(--gold-deep)}
  .pmenu{inset-inline-end:0}
  .pmhead{display:flex;align-items:center;gap:11px;padding:8px 10px 12px;border-bottom:1px solid var(--line-soft);margin-bottom:6px}
  .pmhead .av{width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:800;font-size:15px;flex:none}
  [data-theme="dark"] .pmhead .av{background:var(--gold);color:#1b1407}
  .pmhead b{font-size:15px;font-weight:700;display:block;line-height:1.2}
  .pmhead span{font-size:12px;color:var(--faint);font-weight:600}
  .mitem.danger{color:var(--maint)}
  .mitem.danger .mi{color:var(--maint)}

  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(225px,1fr))}
  .grid.in,.rows.in{animation:fade .4s ease both}
  .tile{text-align:start;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 15px 14px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px;min-height:128px;
    box-shadow:var(--shadow);transition:transform .15s,box-shadow .2s,border-color .2s;
    background-image:linear-gradient(180deg, color-mix(in srgb,var(--sc) 9%, transparent), transparent 64px)}
  .tile::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--sc)}
  .tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lift);border-color:color-mix(in srgb,var(--sc) 45%, var(--line))}
  .tile:active{transform:translateY(0)}
  .tile-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .rnum{display:flex;flex-direction:column;line-height:1}
  .rnum .rlabel{font-size:11px;color:var(--faint);font-weight:700;letter-spacing:.05em;margin-bottom:3px}
  .rnum b{font-size:27px;font-weight:800;letter-spacing:-.02em}
  .spill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--sc);
    background:color-mix(in srgb,var(--sc) 13%, transparent);padding:5px 10px;border-radius:980px;white-space:nowrap;align-self:flex-start}
  .spill .d{width:7px;height:7px;border-radius:50%;background:var(--sc)}
  .tile-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  .gname{font-size:15px;font-weight:650;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gname.empty{color:var(--faint);font-weight:600}
  .gphone{font-size:12.5px;color:var(--dim);margin-top:2px;direction:ltr;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  [dir="rtl"] .gphone{text-align:right}
  .tile-foot{display:flex;flex-direction:column;gap:3px;padding-top:9px;border-top:1px solid var(--line-soft)}
  .dline{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
  .dline svg{width:13px;height:13px;color:var(--faint);flex:none}
  .dline .k{color:var(--faint);font-weight:600;min-width:38px}
  .dline b{font-weight:650;color:var(--text)}
  .dline.hot b{color:var(--checkout)}

  .rows{display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:13px 16px;padding-inline-start:18px;text-align:start;position:relative;overflow:hidden;
    box-shadow:var(--shadow);transition:transform .14s,box-shadow .2s,border-color .2s;
    background-image:linear-gradient(90deg, color-mix(in srgb,var(--sc) 7%, transparent), transparent 130px)}
  .row::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--sc)}
  .row:hover{transform:translateY(-1px);box-shadow:var(--shadow-lift);border-color:color-mix(in srgb,var(--sc) 40%, var(--line))}
  .r-no{display:flex;flex-direction:column;line-height:1;min-width:50px;flex:none}
  .r-no i{font-style:normal;font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.04em;margin-bottom:3px}
  .r-no b{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .r-mid{display:flex;flex-direction:column;min-width:130px;flex:1;gap:2px}
  .r-mid .gn{font-size:15px;font-weight:650;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .r-mid .gn.empty{color:var(--faint);font-weight:600}
  .r-mid .ph{font-style:normal;font-size:12.5px;color:var(--dim);direction:ltr}
  [dir="rtl"] .r-mid .ph{text-align:right}
  .r-dates{display:flex;gap:16px;flex:none}
  .r-dates .dt{display:flex;flex-direction:column;gap:1px;font-size:12.5px}
  .r-dates .dt i{font-style:normal;color:var(--faint);font-weight:600;font-size:11px}
  .r-dates .dt b{font-weight:650;color:var(--text)}
  .r-dates .dt.hot b{color:var(--checkout)}
  .row .spill{flex:none}
  @media(max-width:600px){
    .r-dates{order:3;width:100%;padding-top:9px;margin-top:2px;border-top:1px solid var(--line-soft)}
    .row .spill{order:2;margin-inline-start:auto}
  }

  .empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--faint)}
  .empty-state svg{width:42px;height:42px;opacity:.5;margin-bottom:12px}
  .empty-state p{font-size:15px;font-weight:600}

  .page-h{font-size:23px;font-weight:800;letter-spacing:-.02em;margin-bottom:3px}
  [dir="rtl"] .page-h{letter-spacing:0}
  .page-sub{font-size:13.5px;color:var(--faint);font-weight:600;margin-bottom:20px}
  .stats{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .stat .sl{font-size:13px;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:12px}
  .stat .si{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:color-mix(in srgb,var(--c) 15%, transparent);color:var(--c);flex:none}
  .stat .si svg{width:17px;height:17px}
  .stat .sv{font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .stat .sbar{height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-top:12px}
  .stat .sbar i{display:block;height:100%;border-radius:99px;transition:width .5s}
  .stat .su{font-size:12.5px;color:var(--dim);font-weight:600;margin-top:8px}

  .panels{display:grid;gap:14px;grid-template-columns:1fr 1fr;margin-top:14px}
  @media(max-width:820px){.panels{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
  .panel h3{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text)}
  .donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:center}
  .donut{width:150px;height:150px;flex:none}
  .donut .dnum{font-size:24px;font-weight:800;fill:var(--text)}
  .donut .dlab{font-size:9px;font-weight:700;fill:var(--faint);letter-spacing:.08em}
  .dlegend{display:flex;flex-direction:column;gap:11px;flex:1;min-width:150px}
  .dlegend .li{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;color:var(--dim)}
  .dlegend .li .dot{width:11px;height:11px;border-radius:50%;background:var(--c);flex:none}
  .dlegend .li .lv{margin-inline-start:auto;font-weight:800;color:var(--text);font-size:15px}
  .bk-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
  .bk-row:last-child{margin-bottom:0}
  .bk-row .bl{font-size:13px;font-weight:600;color:var(--dim);min-width:98px;display:flex;align-items:center;gap:8px}
  .bk-row .bl .dot{width:9px;height:9px;border-radius:50%;background:var(--c);flex:none}
  .bk-row .bt{flex:1;height:10px;border-radius:99px;background:var(--surface-2);overflow:hidden}
  .bk-row .bt i{display:block;height:100%;border-radius:99px;background:var(--c);transition:width .5s}
  .bk-row .bv{font-size:14px;font-weight:800;min-width:22px;text-align:end}
  .wpanel{margin-top:14px}
  .wchart{display:flex;align-items:flex-end;gap:12px;height:160px;padding-top:10px}
  .wbar{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
  .wbar .v{font-size:11px;font-weight:700;color:var(--dim);margin-bottom:6px}
  .wbar .col{width:62%;max-width:36px;border-radius:7px 7px 0 0;background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 75%,#fff),var(--gold-deep));min-height:4px;transition:height .5s}
  .wbar.today .col{background:linear-gradient(180deg,var(--booked),var(--gold-deep));box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 35%,transparent)}
  .wbar .d{font-size:11px;color:var(--faint);font-weight:600;margin-top:8px}

  .rate-panel{margin-bottom:14px}
  .rate-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .rate-cur{font-size:15px;font-weight:800;color:var(--gold-deep)}
  .rate-row input{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:16px;font-weight:700;color:var(--text)}
  .rate-row input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(198,162,83,.12)}
  .btn-rate{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;background:var(--navy);color:#fff;font-weight:700;font-size:14px;transition:background .25s,transform .14s;flex:none}
  [data-theme="dark"] .btn-rate{background:var(--gold);color:#1b1407}
  .btn-rate:active{transform:scale(.96)}
  .btn-rate.done{background:var(--free);color:#fff}
  .btn-rate .chk{display:grid;place-items:center}
  .btn-rate .chk svg{width:17px;height:17px;animation:checkpop .35s cubic-bezier(.2,.9,.3,1.4) both}

function requestTranslate(rm,lang){ const key=rm.no+":"+lang; if(_trPending[key]) return; if(rm.descTr && rm.descTr[lang]) return; if(!rm.desc) return; _trPending[key]=true;
  const target=lang==="ar"?"Arabic":"English";
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,messages:[{role:"user",content:"Translate this hotel room description to "+target+". Reply with ONLY the translation \u2014 no quotes, no notes:\n\n"+rm.desc}]})})
    .then(r=>r.json()).then(d=>{ const txt=((d&&d.content)||[]).filter(x=>x.type==="text").map(x=>x.text).join(" ").trim(); if(txt){ rm.descTr=rm.descTr||{}; rm.descTr[lang]=txt; render(); } }).catch(()=>{}).finally(()=>{ delete _trPending[key]; }); }
function bookingPhase(b){ if(b.checkedOut||b.out<TODAY) return "past"; if(b.in>TODAY) return "upcoming"; return "current"; }

function upcomingBooking(no){ const fut=S.bookings.filter(b=>b.room===no && !b.checkedOut && b.in>TODAY).sort((a,b)=>a.in<b.in?-1:1); return fut[0]||null; }

function roomStatus(no){
  const rm=roomOf(no); if(rm&&rm.override) return rm.override;
  const cur=currentBooking(no);
  if(cur) return cur.out===TODAY ? "checkout" : "booked";
  if(upcomingBooking(no)) return "booked";

}

function overlaps(room,inD,outD,exceptId){ return S.bookings.some(b=> b.room===room && !b.checkedOut && b.id!==exceptId && inD < b.out && b.in < outD); }

function counts(){

function visibleRooms(){

    return true;

}

function donut(segs,top,bottom){
  const total=segs.reduce((s,x)=>s+x.v,0)||1; const C=2*Math.PI*54; let off=0,arcs="";
  segs.forEach(s=>{ if(s.v<=0) return; const len=s.v/total*C;
    arcs+='<circle cx="70" cy="70" r="54" fill="none" stroke="'+s.c+'" stroke-width="18" '+(s.tip?'data-tip="'+s.tip+'" ':'')+'stroke-dasharray="'+len.toFixed(2)+' '+(C-len).toFixed(2)+'" stroke-dashoffset="'+(-off).toFixed(2)+'" transform="rotate(-90 70 70)" style="cursor:pointer"/>';
    off+=len; });
  return '<svg viewBox="0 0 140 140" class="donut"><circle cx="70" cy="70" r="54" fill="none" stroke="var(--surface-2)" stroke-width="18"/>'+arcs
    +'<text x="70" y="66" text-anchor="middle" class="dnum">'+top+'</text><text x="70" y="86" text-anchor="middle" class="dlab">'+bottom+'</text></svg>';
}
function revOnDate(iso){ return Math.round(S.bookings.reduce((s,b)=>{ const n=nightsBetween(b.in,b.out); if(n>0 && b.in<=iso && iso<b.out) return s+(Number(b.amount)||0)/n; return s; },0)); }

function trendChart(series,color,suffix){ const W=560,H=150,PT=12,PB=22,PX=12; const n=series.length||1; const vals=series.map(p=>p.v); const max=Math.max.apply(null,vals.concat([1]));
  const X=i=> PX + (W-2*PX)*(n<=1?0:i/(n-1)); const Y=v=> (H-PB) - (H-PT-PB)*(v/max);
  const line=series.map((p,i)=>X(i).toFixed(1)+","+Y(p.v).toFixed(1)).join(" ");
  const area="M"+X(0).toFixed(1)+","+(H-PB)+" L"+series.map((p,i)=>X(i).toFixed(1)+","+Y(p.v).toFixed(1)).join(" L")+" L"+X(n-1).toFixed(1)+","+(H-PB)+" Z";
  const dots=series.map((p,i)=>'<circle class="tdot" cx="'+X(i).toFixed(1)+'" cy="'+Y(p.v).toFixed(1)+'" r="3.3" fill="'+color+'" stroke="var(--surface)" stroke-width="1.4"/>').join("");
  const cw=(W-2*PX)/Math.max(n-1,1);
  const hits=series.map((p,i)=>'<rect class="thit" x="'+(X(i)-cw/2).toFixed(1)+'" y="0" width="'+cw.toFixed(1)+'" height="'+(H-PB)+'" data-tip="'+p.l+': '+p.v+suffix+'" style="cursor:pointer"/>').join("");
  const labs=series.map((p,i)=> (i%2===0||i===n-1)?'<text x="'+X(i).toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" class="ax">'+p.x+'</text>':'').join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" class="trend"><path d="'+area+'" fill="'+color+'" opacity="0.14"/><polyline points="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>'+dots+labs+hits+'</svg>'; }

function pageContent(){
  if(S.page==="timeline") return calendarPage();
  if(S.page==="overview") return overviewPage();
  if(S.page==="rooms" && S.user.role==="admin") return roomsPage();
  if(S.page==="employees" && S.user.role==="admin") return employeesPage();
  return boardPage();
}
function applyRoomPhoto(file, no){
  const rd=new FileReader();
  rd.onload=ev=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; const max=720; if(Math.max(w,h)>max){ const sc=max/Math.max(w,h); w=Math.round(w*sc); h=Math.round(h*sc); } const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); let data; try{ data=c.toDataURL("image/jpeg",0.62); }catch(err){ data=ev.target.result; } const rm=roomOf(no); if(rm){ const ta=document.getElementById("room-desc"); if(ta) rm.desc=ta.value; rm.photo=data; } render(); }; img.src=ev.target.result; };
  rd.readAsDataURL(file);
}
function roomDetails(no){
  if(S.user.role!=="admin" || S.editing || S.openFrom!=="rooms") return "";
  const rm=roomOf(no); if(!rm) return "";
  const photo = rm.photo ? '<div class="rd-photo" style="background-image:url(\'' + rm.photo + '\')"></div>'
    : '<div class="rd-photo empty">'+I.bed+'<span>'+t("noPhoto")+'</span></div>';
  return '<div class="sec-l" style="margin-top:18px">'+t("roomDetails")+' · '+t("floor")+' '+floorOf(no)+'</div>'
    +'<div class="rd">'+photo
    +'<label class="rd-upload">'+I.note+'<span>'+(rm.photo?t("changePhoto"):t("addPhoto"))+'</span><input id="room-photo-input" type="file" accept="image/*" data-room="'+no+'" hidden></label>'
    +'<textarea id="room-desc" class="rd-desc" rows="3" placeholder="'+t("descPh")+'">'+esc(rm.desc||"")+'</textarea>'
    +'<button class="btn soft" data-act="save-room" data-room="'+no+'">'+t("saveDetails")+'</button></div>';
}
function roomHistory(no){
  if(S.editing) return "";
  const all=S.bookings.filter(b=>b.room===no).slice().sort((a,b)=>a.in<b.in?1:-1);
  const admin=S.user.role==="admin";
  const f=S.histFilter||"all";
  const filtered = f==="all"?all:all.filter(b=>bookingPhase(b)===f);
  const nights=all.reduce((s,b)=>s+nightsBetween(b.in,b.out),0);
  const rev=all.reduce((s,b)=>s+(Number(b.amount)||0),0);
  const stats='<div class="rh-stats"><div class="rh-stat"><b>'+all.length+'</b><span>'+t("histBookings")+'</span></div>'
    +'<div class="rh-stat"><b>'+nights+'</b><span>'+t("histNights")+'</span></div>'
    +(admin?'<div class="rh-stat"><b>'+fmtMoney(rev)+'</b><span>'+t("histRevenue")+'</span></div>':'')+'</div>';
  const chips=["all","current","upcoming","past"].map(k=>'<button class="rh-chip'+(f===k?" on":"")+'" data-act="hist-filter" data-f="'+k+'">'+t("hist_"+k)+'</button>').join("");
  const list = filtered.length ? filtered.map(b=>{ const ph=bookingPhase(b); const n=nightsBetween(b.in,b.out);
      return '<div class="rh-item"><div class="rh-itop"><b>'+esc(b.name)+'</b><span class="rh-phase '+ph+'">'+t("hist_"+ph)+'</span></div>'
        +'<div class="rh-imeta">'+I.cal+'<span>'+fmtDate(b.in)+' → '+fmtDate(b.out)+' · '+n+' '+(n===1?t("night"):t("nights"))+'</span></div>'
        +'<div class="rh-imeta">'+I.globe+'<span>'+t("src_"+(b.source||"direct"))+(admin&&b.amount?' · '+fmtMoney(b.amount):'')+'</span></div></div>';
    }).join("") : '<div class="rh-empty">'+t("histEmpty")+'</div>';
  return '<div class="sec-l" style="margin-top:18px">'+t("histTitle")+'</div>'+stats+'<div class="rh-chips">'+chips+'</div><div class="rh-list">'+list+'</div>';
}
function roomsPage(){
  const card=r=>{
    const st=roomStatus(r.no); const cur=focusBooking(r.no);
    const photo = r.photo ? '<div class="rp-photo" style="background-image:url(\'' + r.photo + '\')"></div>'
      : '<div class="rp-photo empty">'+I.bed+'</div>';
    const desc = r.desc ? esc(descFor(r)) : '<i>'+t("noDescription")+'</i>';
    const guest = (st==="booked"||st==="checkout") && cur ? '<div class="rp-guest">'+I.user+'<span>'+esc(cur.name)+'</span></div>' : '';
    return '<button class="rp-card" data-act="open" data-room="'+r.no+'" data-from="rooms">'+photo
      +'<div class="rp-body"><div class="rp-top"><b>'+t("roomWord")+' '+r.no+'</b><span class="spill" style="--sc:'+SCOLOR[st]+'"><i class="d"></i>'+t(st)+'</span></div>'
      +'<div class="rp-desc">'+desc+'</div>'+guest+'</div></button>';
  };
  const f1=S.rooms.filter(r=>floorOf(r.no)===1).map(card).join("");
  const f2=S.rooms.filter(r=>floorOf(r.no)===2).map(card).join("");
  return '<div class="page-h">'+t("nav_rooms")+'</div><div class="page-sub">'+t("roomsSub")+'</div>'
    +'<div class="floor-h">'+t("floor1")+'</div><div class="rp-grid">'+f1+'</div>'
    +'<div class="floor-h">'+t("floor2")+'</div><div class="rp-grid">'+f2+'</div>';
}

function view(){ return S.authed ? appView() : loginView(); }

const root=document.getElementById("app");
function applyChrome(){
  document.documentElement.lang=S.lang;
  document.documentElement.dir=(S.lang==="ar")?"rtl":"ltr";
  document.documentElement.setAttribute("data-theme",S.theme);
  const tc=getComputedStyle(document.body).getPropertyValue("--bg").trim();
  const meta=document.querySelector('meta[name="theme-color"]'); if(meta&&tc) meta.setAttribute("content",tc);
}
function render(){
  const sy=window.scrollY;
  const oldSheet=root.querySelector(".sheet"); const sheetScroll=oldSheet?oldSheet.scrollTop:0;
  const justOpened=S._sheetJustOpened;
  persist();
  root.innerHTML=view();
  if(S._sheetJustOpened) S._sheetJustOpened=false;
  if(S._firstLoad) S._firstLoad=false;
  if(S._focusSearch){ const el=root.querySelector("[data-search]"); if(el){ el.focus(); const v=el.value; try{el.setSelectionRange(v.length,v.length);}catch(e){} } S._focusSearch=false; }
  if(S._focusId){ const el=byId(S._focusId); if(el){ el.focus(); try{const v=el.value;el.setSelectionRange(v.length,v.length);}catch(e){} } S._focusId=false; }
  const newSheet=root.querySelector(".sheet"); if(newSheet && !justOpened) newSheet.scrollTop=sheetScroll;
  window.scrollTo(0,sy);
}
function closeSheet(){ S.open=null; S.editing=false; S.openBookingId=null; S.newBookingDate=null; S.sheetError=""; S.form=null; S.dpOpen=null; S.ccOpen=false; S.ccSearch=""; S.maintEntry=null; S.maintErr=""; S.histFilter="all"; S.openFrom="board"; }
let _toastT=null;
function toast(msg){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; el.className="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add("show");
  clearTimeout(_toastT); _toastT=setTimeout(()=>{ el.classList.remove("show"); },2600);
}
function doLogin(){
  const u=(byId("l-u")||{}).value||""; const p=(byId("l-p")||{}).value||"";
  const acc=ACCOUNTS.find(a=>a.u===u.trim().toLowerCase()&&a.p===p);
  if(acc){ S.authed=true; S.user={name:acc.name,role:acc.role,username:acc.u}; S.loginError=false; S.loginU=""; S.page="board"; S._firstLoad=true; }
  else { S.loginError=true; S.loginU=u; }
  render();
}

document.addEventListener("click", e=>{
  const el=e.target.closest("[data-act]");
  const act=el?el.getAttribute("data-act"):null;

  if((S.filterOpen||S.menuOpen) && !e.target.closest(".menu") && act!=="toggle-filter" && act!=="toggle-menu"){
    S.filterOpen=false; S.menuOpen=false; if(!el){ render(); return; }
  }
  const dpActs=["dp-open","dp-prevm","dp-nextm","dp-pick"];
  const ccActs=["toggle-cc","pick-cc"];
  let closedPop=false;
  if(S.dpOpen && !e.target.closest(".dp") && (!act || dpActs.indexOf(act)<0)){ S.dpOpen=null; closedPop=true; }
  if(S.ccOpen && !e.target.closest(".cc-list") && (!act || ccActs.indexOf(act)<0)){ S.ccOpen=false; S.ccSearch=""; closedPop=true; }
  if(!el){ if(closedPop) render(); return; }

  if(act==="toggle-pw"){
    const inp=byId(el.getAttribute("data-target"));
    if(inp){ inp.type=inp.type==="password"?"text":"password"; el.innerHTML=inp.type==="password"?I.eye:I.eyeOff; }
    return;
  }

  const roomNo=el.getAttribute("data-room");
  const bId=el.getAttribute("data-booking");

  if(act==="lang"){ S.lang=S.lang==="ar"?"en":"ar"; applyChrome(); render(); return; }
  if(act==="theme"){ S.theme=S.theme==="light"?"dark":"light"; applyChrome(); render(); return; }
  if(act==="login"){ doLogin(); return; }
  if(act==="signout"){ S.authed=false; S.user=null; S.menuOpen=false; closeSheet(); S.page="board"; render(); return; }
  if(act==="toggle-menu"){ S.menuOpen=!S.menuOpen; S.filterOpen=false; render(); return; }
  if(act==="toggle-filter"){ S.filterOpen=!S.filterOpen; S.menuOpen=false; render(); return; }
  if(act==="toggle-drawer"){ S.drawerOpen=!S.drawerOpen; S.menuOpen=false; render(); return; }
  if(act==="close-drawer"){ S.drawerOpen=false; render(); return; }
  if(act==="nav"){ const p=el.getAttribute("data-page"); if((p==="employees"||p==="rooms")&&S.user.role!=="admin") return; S.page=p; closeSheet(); S.menuOpen=false; S.drawerOpen=false; if(p==="board") S._firstLoad=true; render(); return; }
  if(act==="view"){ S.view=el.getAttribute("data-view"); render(); return; }
  if(act==="filter"){ S.filter=el.getAttribute("data-filter"); S.filterOpen=false; render(); return; }

  if(act==="open"){ S.open=parseInt(roomNo,10); S.openFrom=el.getAttribute("data-from")||"board"; S.editing=false; S.openBookingId=null; S.newBookingDate=null; S.sheetError=""; S.form=null; S._sheetJustOpened=true; render(); return; }
  if(act==="close"){ closeSheet(); render(); return; }
  if(act==="backdrop"){ if(e.target.closest("[data-stop]")){ if(closedPop) render(); return; } closeSheet(); render(); return; }

  if(act==="tl-prev"){ S.tlStart-=7; render(); return; }
  if(act==="tl-next"){ S.tlStart+=7; render(); return; }
  if(act==="tl-today"){ S.tlStart=0; render(); return; }
  if(act==="calview"){ S.calView=el.getAttribute("data-cal"); render(); return; }
  if(act==="m-prev"){ S.calMonthOffset-=1; render(); return; }
  if(act==="m-next"){ S.calMonthOffset+=1; render(); return; }
  if(act==="m-today"){ S.calMonthOffset=0; render(); return; }
  if(act==="month-day"){ const d=el.getAttribute("data-date"); S.calView="timeline"; S.tlStart=diffDays(TODAY,d); render(); return; }
  if(act==="tl-cell"){ S.open=parseInt(roomNo,10); S.openFrom="board"; S.openBookingId=null; S.newBookingDate=el.getAttribute("data-date"); initForm(S.open,null,S.newBookingDate); S.editing=true; S.sheetError=""; S._sheetJustOpened=true; render(); return; }
  if(act==="tl-bar"){ const b=bookingById(parseInt(bId,10)); if(b){ S.open=b.room; S.openFrom="board"; S.openBookingId=b.id; S.editing=false; S.newBookingDate=null; S.sheetError=""; S.form=null; S._sheetJustOpened=true; } render(); return; }

  if(act==="edit"){ const fb=focusBooking(S.open); S.openBookingId=fb?fb.id:null; initForm(S.open, fb, null); S.editing=true; S.sheetError=""; render(); return; }
  if(act==="cancel-edit"){ S.editing=false; S.sheetError=""; S.newBookingDate=null; S.form=null; S.dpOpen=null; S.ccOpen=false; S.ccSearch=""; render(); return; }
  if(act==="markready"){ const rm=roomOf(parseInt(roomNo,10)); if(rm){ rm.override=null; rm.issue=""; } S.maintEntry=null; render(); return; }
  if(act==="status"){ const st=el.getAttribute("data-status"); const no=parseInt(roomNo,10); const rm=roomOf(no); if(!rm) return; if(st==="maintenance"){ S.maintEntry=no; S.maintErr=""; render(); return; } rm.override=(st==="empty")?null:st; rm.issue=""; S.maintEntry=null; render(); return; }
  if(act==="confirm-maint"){ const no=parseInt(roomNo,10); const rm=roomOf(no); const ta=byId("maint-issue"); const txt=ta?ta.value.trim():""; if(!txt){ S.maintErr=t("issueRequired"); render(); return; } if(rm){ rm.override="maintenance"; rm.issue=txt; } S.maintEntry=null; S.maintErr=""; toast(t("issueSaved")); render(); return; }
  if(act==="cancel-maint"){ S.maintEntry=null; S.maintErr=""; render(); return; }
  if(act==="hist-filter"){ S.histFilter=el.getAttribute("data-f"); render(); return; }
  if(act==="checkout"){ const b=bookingById(parseInt(bId,10)); if(b){ b.checkedOut=true; const rm=roomOf(b.room); if(rm) rm.override="cleaning"; } S.openBookingId=null; S.editing=false; S.maintEntry=null; toast(t("nowCleaning")); render(); return; }
  if(act==="cancelbooking"){ const id=parseInt(bId,10); S.bookings=S.bookings.filter(b=>b.id!==id); closeSheet(); render(); return; }

  if(act==="toggle-cc"){ S.ccOpen=!S.ccOpen; S.ccSearch=""; S.dpOpen=null; render(); return; }
  if(act==="pick-cc"){ if(S.form) S.form.cc=el.getAttribute("data-cc"); S.ccOpen=false; S.ccSearch=""; render(); return; }
  if(act==="dp-open"){ const w=el.getAttribute("data-which"); if(S.dpOpen===w){ S.dpOpen=null; } else { S.dpOpen=w; S.dpMonth=firstOfMonth(S.form[w==="in"?"inDate":"outDate"]); } S.ccOpen=false; render(); return; }
  if(act==="dp-prevm"){ S.dpMonth=shiftMonth(S.dpMonth,-1); render(); return; }
  if(act==="dp-nextm"){ S.dpMonth=shiftMonth(S.dpMonth,1); render(); return; }
  if(act==="dp-pick"){ const d=el.getAttribute("data-date"); if(S.form){ if(S.dpOpen==="in"){ S.form.inDate=d; S.form.outDate=isoAdd(d,1); } else { S.form.outDate=d; } recalcAmount(); } S.dpOpen=null; render(); return; }
  if(act==="set-source"){ if(S.form){ S.form.source=el.getAttribute("data-source"); } render(); return; }
  if(act==="save-room"){ const rm=roomOf(parseInt(roomNo,10)); const ta=byId("room-desc"); if(rm && ta){ rm.desc=ta.value; rm.descTr={}; } toast(t("savedDetails")); render(); return; }

  if(act==="save-guest"){
    const no=S.open; const f=S.form||{};
    const name=(f.name||"").trim(); const phone=(f.phone||"").trim();
    const ci=f.inDate||TODAY; const co=f.outDate||isoAdd(ci,1); const amt=parseFloat(f.amount)||0; const cc=f.cc||"+966";
    if(!name){ S.sheetError=t("fillAll"); render(); return; }
    if(co<=ci){ S.sheetError=t("dateErr"); render(); return; }
    const exceptId = S.openBookingId!=null ? S.openBookingId : -1;
    if(overlaps(no,ci,co,exceptId)){ S.sheetError=t("overlapErr"); render(); return; }
    const rate=S.dailyRate; const nn=nightsBetween(ci,co); const expd=(rate>0&&nn>0)?rate*nn:0;
    const reason = (amt<expd) ? (f.reason||"").trim() : "";
    const inT=((byId("f-intime")||{}).value)||f.inTime||"15:00"; const outT=((byId("f-outtime")||{}).value)||f.outTime||"12:00"; const src=f.source||"direct";
    if(S.openBookingId!=null){ const b=bookingById(S.openBookingId); if(b){ b.name=name; b.phone=phone; b.cc=cc; b.in=ci; b.out=co; b.inTime=inT; b.outTime=outT; b.source=src; b.amount=amt; b.rate=rate; b.reason=reason; } }
    else { const nb={id:S.bookingSeq++, room:no, name:name, phone:phone, cc:cc, in:ci, out:co, inTime:inT, outTime:outT, source:src, amount:amt, rate:rate, reason:reason, checkedOut:false}; S.bookings.push(nb); S.openBookingId=nb.id; }
    S.editing=false; S.sheetError=""; S.newBookingDate=null; S.dpOpen=null; S.ccOpen=false; S.ccSearch=""; render(); return;
  }

  if(act==="set-rate"){ const v=parseInt((byId("rate-input")||{}).value,10)||0; S.dailyRate=v; S.rateSaved=true; render(); clearTimeout(S._rateT); S._rateT=setTimeout(()=>{ S.rateSaved=false; render(); },1700); return; }

  if(act==="add-emp"){
    const name=((byId("e-name")||{}).value||"").trim(); const user=((byId("e-user")||{}).value||"").trim().toLowerCase();
    const pass=(byId("e-pass")||{}).value||""; const role=(byId("e-role")||{}).value||"staff";
    if(!name||!user||!pass){ S.empError=t("fillAll"); render(); return; }
    if(ACCOUNTS.some(a=>a.u===user)){ S.empError=t("userTaken"); render(); return; }
    ACCOUNTS.push({u:user,p:pass,name:name,role:role}); S.employees.push({name:name,username:user,role:role,seed:false,pass:pass});
    S.empError=""; render(); return;
  }
  if(act==="remove-emp"){
    const u=el.getAttribute("data-user"); const emp=S.employees.find(x=>x.username===u);
    if(emp&&!emp.seed){ S.employees=S.employees.filter(x=>x.username!==u); for(let i=ACCOUNTS.length-1;i>=0;i--){ if(ACCOUNTS[i].u===u) ACCOUNTS.splice(i,1); } }
    render(); return;
  }
});
document.addEventListener("input", e=>{
  const s=e.target.closest("[data-search]"); if(s){ S.search=s.value; S._focusSearch=true; render(); return; }
  const id=e.target.id;
  if(id==="cc-search"){ S.ccSearch=e.target.value; S._focusId="cc-search"; render(); return; }
  if(!S.form) return;
  if(id==="f-name"){ S.form.name=e.target.value; return; }
  if(id==="f-phone"){ S.form.phone=e.target.value; return; }
  if(id==="f-reason"){ S.form.reason=e.target.value; return; }
  if(id==="f-amount"){ const v=e.target.value.replace(/[^0-9.]/g,""); e.target.value=v; S.form.amount=v; S.form.amountAuto=false; S._focusId="f-amount"; render(); return; }
});
document.addEventListener("keydown", e=>{ if(!S.authed && e.key==="Enter"){ const f=e.target.closest("#l-u,#l-p"); if(f){ e.preventDefault(); doLogin(); } } });
function ensureTip(){ let el=document.getElementById("qtip"); if(!el){ el=document.createElement("div"); el.id="qtip"; el.className="qtip"; document.body.appendChild(el); } return el; }
document.addEventListener("mouseover", e=>{ const tg=e.target.closest&&e.target.closest("[data-tip]"); if(!tg) return; const el=ensureTip(); el.textContent=tg.getAttribute("data-tip"); el.classList.add("show"); });
document.addEventListener("mousemove", e=>{ const el=document.getElementById("qtip"); if(!el||!el.classList.contains("show")) return; el.style.left=(e.clientX+12)+"px"; el.style.top=(e.clientY+14)+"px"; });
document.addEventListener("mouseout", e=>{ const tg=e.target.closest&&e.target.closest("[data-tip]"); if(tg){ const el=document.getElementById("qtip"); if(el) el.classList.remove("show"); } });
document.addEventListener("change", e=>{ if(e.target.id==="room-photo-input"){ const f=e.target.files&&e.target.files[0]; if(f) applyRoomPhoto(f, parseInt(e.target.getAttribute("data-room"),10)); return; } if(!S.form) return; if(e.target.id==="f-intime"){ S.form.inTime=e.target.value; } else if(e.target.id==="f-outtime"){ S.form.outTime=e.target.value; } });

loadPersisted();
applyChrome();
render();
</script>
